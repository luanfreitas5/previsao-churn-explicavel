name: Temp Autofix Ruff

on:
  push:
    branches: [fix/lint-format-ruff]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/lint-format-ruff
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"
      - run: uv sync --dev
      - run: uv run ruff check . --fix --unsafe-fixes || true
      - run: uv run ruff format .
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: autofix ruff lint/format (temp)"
          git push
