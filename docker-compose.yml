# =============================================================================
# docker-compose.yml — orquestra o dashboard e um servidor MLflow local.
# =============================================================================
services:
  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      # Modelos e dados processados são montados (gerados pela pipeline no host).
      - ./models:/app/models:ro
      - ./data/processed:/app/data/processed:ro
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

volumes:
  mlflow_data:
